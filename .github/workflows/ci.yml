name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install frontend dependencies
        run: npm ci
        working-directory: web

      - name: Lint frontend sources
        run: npm run lint
        working-directory: web

      - name: Build frontend assets
        run: npm run build
        working-directory: web

      - name: Upload built frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist

  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run Go tests with coverage
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  package:
    name: Package
    runs-on: ubuntu-latest
    needs:
      - frontend
      - go-test
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download built frontend assets
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Build Go binaries
        run: |
          mkdir -p dist/bin
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/bin/domainriskdigest-api ./cmd/api
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/bin/domainriskdigest-worker ./cmd/worker
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o dist/bin/domainriskdigest-kuberhealthy-api-check ./cmd/kuberhealthy-api-check

      - name: Build Docker images
        run: docker build --target api -t domainriskdigest-api:ci . && docker build --target worker -t domainriskdigest-worker:ci . && docker build --target kuberhealthy-api-check -t domainriskdigest-kuberhealthy-api-check:ci .

      - name: Prepare distribution package
        run: |
          rm -rf dist/package
          mkdir -p dist/package
          cp README.md dist/package/
          cp -R deploy dist/package/
          cp -R migrations dist/package/
          cp -R web/dist dist/package/web-dist
          cp dist/bin/domainriskdigest-api dist/package/
          cp dist/bin/domainriskdigest-worker dist/package/
          cp dist/bin/domainriskdigest-kuberhealthy-api-check dist/package/
          VERSION="${GITHUB_REF_NAME}"
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            VERSION="pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}"
          elif [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            VERSION="${GITHUB_SHA::7}"
          fi
          tar -C dist/package -czf "dist/domainriskdigest-${VERSION}-linux-amd64.tar.gz" .

      - name: Upload distribution package
        uses: actions/upload-artifact@v4
        with:
          name: domainriskdigest-package
          path: dist/domainriskdigest-*.tar.gz

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs:
      - frontend
      - go-test
    permissions:
      contents: read
      pull-requests: read
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: .

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v8.0.0
