
services:
  # PostgreSQL database for the DomainRiskDigest application
  postgres:
    image: postgres:18.3
    container_name: postgres-sec-api
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements,auto_explain
      - -c
      - compute_query_id=on
      - -c
      - pg_stat_statements.track=all
      - -c
      - pg_stat_statements.max=10000
      - -c
      - pg_stat_statements.save=on
      - -c
      - logging_collector=on
      - -c
      - log_destination=stderr
      - -c
      - log_directory=log
      - -c
      - log_filename=sec-api-postgres-%Y-%m-%d_%H%M%S.log
      - -c
      - log_rotation_age=1d
      - -c
      - log_rotation_size=50MB
      - -c
      - log_min_duration_statement=250ms
      - -c
      - log_statement=none
      - -c
      - log_checkpoints=on
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_lock_waits=on
      - -c
      - deadlock_timeout=1s
      - -c
      - log_temp_files=0
      - -c
      - log_line_prefix=%m [%p] %q%u@%d 
      - -c
      - auto_explain.log_min_duration=500ms
      - -c
      - auto_explain.log_analyze=on
      - -c
      - auto_explain.log_buffers=on
      - -c
      - auto_explain.log_timing=on
      - -c
      - auto_explain.log_triggers=on
      - -c
      - auto_explain.log_verbose=on
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: sec-api
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sec-api"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - sec-api-data-v18:/var/lib/postgresql
      - ./migrations/000001_init.sql:/docker-entrypoint-initdb.d/000001_init.sql:ro

  # pgAdmin 4 web interface for managing the sec-api database
  pgadmin:
    image: dpage/pgadmin4:9.14
    container_name: pgadmin4
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Required admin credentials [oai_citation:3‡pgadmin.org](https://www.pgadmin.org/docs/pgadmin4/latest/container_deployment.html#:~:text=PGADMIN_DEFAULT_EMAIL).
      PGADMIN_DEFAULT_EMAIL: pgadmin@local.test
      PGADMIN_DEFAULT_PASSWORD: ChangeMeLocalOnly123!
      # Use a non‑privileged port (>1024) on hosts that restrict low ports [oai_citation:4‡pgadmin.org](https://www.pgadmin.org/docs/pgadmin4/latest/container_deployment.html#:~:text=possible%20to%20run%20pgAdmin%20without,the%20environment%20variable%2C%20for%20example).
      PGADMIN_LISTEN_PORT: 5050
      # Reload server definitions on every start.
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      # Let pgAdmin use a mounted pgpass file so the server is ready to connect.
      PGPASS_FILE: /pgpassfile
    ports:
      - "5050:5050"
    volumes:
      # Persist pgAdmin session data and configuration
      - pgadmin-data:/var/lib/pgadmin
      # Preload connection details for the sec-api database
      - ./servers.json:/pgadmin4/servers.json
      - ./.pgpass:/pgpassfile:ro

  api:
    build:
      context: .
      target: api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sec-api?sslmode=disable
      CRON_SCHEDULE: '@hourly'
      HIBP_API_KEY: ""
      NVD_API_KEY: ""
    ports:
      - "8080:8080"
    restart: unless-stopped

  worker:
    build:
      context: .
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: docker
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/sec-api?sslmode=disable
      CRON_SCHEDULE: '@hourly'
      HIBP_API_KEY: ""
      NVD_API_KEY: ""
    restart: unless-stopped

volumes:
  sec-api-data-v18:
  pgadmin-data:
